name: TOTOSHA SEO Autopilot

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "public/**"
      - "components/**"
      - "data/**"
      - "lib/**"
      - "scripts/seo/**"
      - ".github/workflows/seo-autopilot.yml"

permissions:
  contents: read
  statuses: read
  id-token: write

concurrency:
  group: totosha-seo-autopilot
  cancel-in-progress: false

jobs:
  seo:
    name: Monitor, report and notify search engines
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Use Node.js 24
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Wait for Vercel production deployment
        if: github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/seo/wait-for-vercel.mjs

      - name: Technical SEO monitor
        id: monitor
        continue-on-error: true
        run: |
          node scripts/seo/monitor.mjs \
            --json seo-report.json \
            --markdown seo-report.md

      - name: Authenticate to Google Cloud
        id: google-auth
        continue-on-error: true
        uses: google-github-actions/auth@v3
        with:
          project_id: totosha-seo-autopilot
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/webmasters.readonly
          create_credentials_file: false
          export_environment_variables: false

      - name: Google Search Console report
        continue-on-error: true
        env:
          GOOGLE_OAUTH_ACCESS_TOKEN: ${{ steps.google-auth.outputs.access_token }}
          GOOGLE_AUTH_OUTCOME: ${{ steps.google-auth.outcome }}
        run: node scripts/seo/gsc.mjs gsc-report.json

      - name: Notify IndexNow after deployed site changes
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        continue-on-error: true
        run: node scripts/seo/indexnow.mjs

      - name: Send Telegram report
        if: always()
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/seo/telegram.mjs seo-report.json gsc-report.json

      - name: Upload SEO report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: totosha-seo-report-${{ github.run_number }}
          path: |
            seo-report.json
            seo-report.md
            gsc-report.json
          if-no-files-found: warn
          retention-days: 30

      - name: Fail on critical technical errors
        if: steps.monitor.outcome == 'failure'
        run: |
          echo "Critical SEO monitoring errors were detected."
          exit 1
