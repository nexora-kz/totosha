name: Production Photo Check

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify-production-photos:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Verify live version and bundled photos
        run: |
          python - <<'PY'
          import json
          import re
          import time
          import urllib.request
          from urllib.parse import urljoin

          SITE = "https://www.totoshakids.kz"
          PAGES = ["/", "/about", "/programs", "/parents"]
          EXPECTED_VERSION = "v083"
          headers = {"User-Agent": "TOTOSHA-Production-Photo-Check/1.0", "Cache-Control": "no-cache"}

          def fetch(url):
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=30) as response:
                  body = response.read()
                  return response.status, response.headers, body

          last_error = None
          for attempt in range(18):
              try:
                  status, response_headers, body = fetch(f"{SITE}/api/health?photo_check={int(time.time())}")
                  data = json.loads(body.decode("utf-8"))
                  print("Live health:", data)
                  if status == 200 and data.get("version") == EXPECTED_VERSION:
                      break
                  last_error = f"version={data.get('version')} status={status}"
              except Exception as exc:
                  last_error = repr(exc)
              print(f"Waiting for production v083, attempt {attempt + 1}: {last_error}")
              time.sleep(10)
          else:
              raise SystemExit(f"Production did not reach {EXPECTED_VERSION}: {last_error}")

          found_assets = set()
          for path in PAGES:
              status, response_headers, body = fetch(f"{SITE}{path}?photo_check={int(time.time())}")
              html = body.decode("utf-8", errors="replace")
              if status != 200:
                  raise SystemExit(f"{path}: HTTP {status}")
              assets = set(re.findall(r'/_next/static/media/[^\"\'<> ]+\.(?:jpg|jpeg|png|webp)', html, flags=re.I))
              print(f"{path}: bundled photo assets = {sorted(assets)}")
              if not assets:
                  raise SystemExit(f"{path}: no bundled photo asset found in rendered HTML")
              found_assets.update(assets)

          if len(found_assets) < 3:
              raise SystemExit(f"Expected at least 3 distinct photo assets, found {len(found_assets)}")

          for asset in sorted(found_assets):
              url = urljoin(SITE, asset)
              status, response_headers, body = fetch(url)
              content_type = response_headers.get("Content-Type", "")
              print(f"Asset {asset}: status={status}, type={content_type}, bytes={len(body)}")
              if status != 200:
                  raise SystemExit(f"{asset}: HTTP {status}")
              if not content_type.lower().startswith("image/"):
                  raise SystemExit(f"{asset}: invalid content type {content_type}")
              if len(body) < 10000:
                  raise SystemExit(f"{asset}: image is unexpectedly small ({len(body)} bytes)")

          print("PRODUCTION PHOTO CHECK PASSED")
          PY
