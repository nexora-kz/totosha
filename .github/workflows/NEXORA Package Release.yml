name: NEXORA Package Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, example: v033"
        required: true
        default: "v033"

permissions:
  contents: write
  actions: read

concurrency:
  group: nexora-package-release
  cancel-in-progress: true

jobs:
  package-release:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout TOTOSHA
        uses: actions/checkout@v4
        with:
          path: site

      - name: Checkout TOTOSHA updates
        uses: actions/checkout@v4
        with:
          repository: nexora-kz/totosha-updates
          token: ${{ secrets.NEXORA_TOKEN }}
          path: updates
          fetch-depth: 0

      - name: Create release ZIP
        run: |

          VERSION="${{ github.event.inputs.version }}"
          ZIP_NAME="totosha-production-${VERSION}.zip"

          rm -rf "updates/release/${VERSION}"
          mkdir -p "updates/release/${VERSION}"

          cd site

          rm -rf node_modules
          rm -rf .next

          find . -type d -name node_modules -prune -exec rm -rf {} +

          find . -type d -name .next -prune -exec rm -rf {} +

          zip -r "../updates/release/${VERSION}/${ZIP_NAME}" . \
            -x ".git/*" \
            -x ".github/*" \
            -x "node_modules/*" \
            -x ".next/*"

          cd ..

          cat > updates/release/${VERSION}/release.json << EOF
          {
            "version":"${VERSION}",
            "status":"approved",
            "release":true,
            "source":"${ZIP_NAME}"
          }
          EOF

          cat > updates/release/current.json << EOF
          {
            "active_version":"${VERSION}",
            "auto_deploy":true
          }
          EOF

      - name: Commit release package
        working-directory: updates
        run: |

          git config user.name "NEXORA Package Bot"

          git config user.email \
          "nexora-package-bot@users.noreply.github.com"

          git pull origin main

          git add release

          if [ -z "$(git status --short)" ]; then
            echo "No changes"
            exit 0
          fi

          git commit \
          -m "Create TOTOSHA release ${{ github.event.inputs.version }}"

          git push origin main
