name: TOTOSHA Release Gate

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: totosha-release-gate-production
  cancel-in-progress: true

jobs:
  release-gate:
    name: Check production site after deployment
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Run production Release Gate
        uses: actions/github-script@v8
        with:
          script: |
            const commit = context.sha.slice(0, 12);
            const url = `https://www.totoshakids.kz/api/release-check?commit=${commit}`;
            core.info(`Expected production commit: ${commit}`);
            core.info(`Release Gate: ${url}`);

            let lastLiveCommit = 'unknown';
            let lastSummary = null;

            for (let attempt = 1; attempt <= 45; attempt += 1) {
              core.info(`Attempt ${attempt}/45`);
              try {
                const response = await fetch(url, { cache: 'no-store' });
                const text = await response.text();
                core.info(text);
                const data = JSON.parse(text);

                lastLiveCommit = data.commit?.live || 'unknown';
                lastSummary = data.summary || null;

                if (data.ok === true && data.gate === 'pass' && data.commit?.matches === true) {
                  core.info('TOTOSHA Release Gate PASSED');
                  return;
                }
              } catch (error) {
                core.info(`Release Gate is not ready yet: ${error.message}`);
              }

              await new Promise((resolve) => setTimeout(resolve, 20000));
            }

            core.setFailed(
              `TOTOSHA Release Gate FAILED for production commit ${commit}. ` +
              `Last live commit: ${lastLiveCommit}. ` +
              `Last check summary: ${JSON.stringify(lastSummary)}`,
            );
