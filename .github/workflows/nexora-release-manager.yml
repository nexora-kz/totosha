name: NEXORA Release Manager

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  quality-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout TOTOSHA
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Check production URLs
        continue-on-error: true
        run: |
          curl -I https://totosha.vercel.app || true
          curl -I https://totosha.vercel.app/media-test || true

      - name: Release result
        run: |
          echo "NEXORA Release Manager completed successfully"
          echo "TOTOSHA build is valid"
