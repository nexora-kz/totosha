name: NEXORA Package Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, example: v032"
        required: true
        default: "v032"

permissions:
  contents: write
  actions: write

concurrency:
  group: nexora-package-release
  cancel-in-progress: false

jobs:
  package-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout TOTOSHA
        uses: actions/checkout@v4
        with:
          path: site

      - name: Checkout TOTOSHA updates
        uses: actions/checkout@v4
        with:
          repository: nexora-kz/totosha-updates
          token: ${{ secrets.NEXORA_TOKEN }}
          path: updates

      - name: Create release ZIP
        run: |
          VERSION="${{ github.event.inputs.version }}"
          ZIP_NAME="totosha-production-${VERSION}.zip"

          rm -rf "updates/release/${VERSION}"
          mkdir -p "updates/release/${VERSION}"

          cd site

          rm -rf node_modules .next
          find . -type d -name node_modules -prune -exec rm -rf {} +
          find . -type d -name .next -prune -exec rm -rf {} +

          zip -r "../updates/release/${VERSION}/${ZIP_NAME}" . \
            -x ".git/*" \
            -x ".github/*" \
            -x "node_modules/*" \
            -x ".next/*"

          cd ..

          cat > "updates/release/${VERSION}/release.json" <<EOF
          {
            "version":"${VERSION}",
            "status":"approved",
            "release":true,
            "source":"${ZIP_NAME}"
          }
          EOF

          cat > "updates/release/current.json" <<EOF
          {
            "active_version":"${VERSION}",
            "auto_deploy":true
          }
          EOF

      - name: Commit release package to updates
        working-directory: updates
        run: |
          git config user.name "NEXORA Package Bot"
          git config user.email "nexora-package-bot@users.noreply.github.com"

          git add release

          if [ -z "$(git status --short)" ]; then
            echo "No release changes to commit"
            exit 0
          fi

          git commit -m "Create TOTOSHA release ${{ github.event.inputs.version }}"

          for i in 1 2 3 4 5; do
            git push origin HEAD:main --force && break
            echo "Push failed, retry $i..."
            sleep 5
            git fetch origin main
          done

      - name: Trigger TOTOSHA Release Manager
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.NEXORA_TOKEN }}" \
            https://api.github.com/repos/nexora-kz/totosha/actions/workflows/nexora-release-manager.yml/dispatches \
            -d '{"ref":"main"}'
